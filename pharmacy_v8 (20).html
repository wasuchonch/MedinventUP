<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ระบบจัดการยา</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,'TH Sarabun New',Arial,sans-serif;font-size:14px;background:#f0f2f5;color:#1a1a18;min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a56db 0%,#0e3d8a 100%);padding:16px}
.login-card{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-icon{text-align:center;font-size:44px;margin-bottom:10px}
.login-title{font-size:22px;font-weight:bold;text-align:center;margin-bottom:4px;color:#1a56db}
.login-sub{font-size:13px;color:#888;text-align:center;margin-bottom:20px}
.fg{margin-bottom:12px}
.fl{display:block;font-size:12px;color:#555;margin-bottom:4px;font-weight:bold;text-transform:uppercase;letter-spacing:.4px}
.fi{width:100%;padding:9px 11px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;color:#1a1a18;background:#fff;transition:border-color .2s}
.fi:focus{outline:none;border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,.1)}
textarea.fi{resize:vertical;min-height:60px}
select.fi{cursor:pointer}
.err{color:#991b1b;font-size:12px;min-height:16px;margin-bottom:6px}
.btn{padding:8px 16px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;color:#333;font-size:13px;font-family:inherit;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.btn:hover{background:#f5f7ff;border-color:#1a56db;color:#1a56db;box-shadow:0 2px 8px rgba(26,86,219,.12)}
.btn-blue{background:linear-gradient(135deg,#1a56db,#1340b0);border-color:#1340b0;color:#fff;box-shadow:0 2px 8px rgba(26,86,219,.3)}
.btn-blue:hover{background:linear-gradient(135deg,#1340b0,#0e2d8a);box-shadow:0 4px 12px rgba(26,86,219,.4)}
.btn-red{background:#fef2f2;border-color:#fca5a5;color:#991b1b}
.btn-red:hover{background:#fee2e2}
.btn-green{background:linear-gradient(135deg,#22c55e,#16a34a);border-color:#16a34a;color:#fff;box-shadow:0 2px 8px rgba(34,197,94,.3)}
.btn-green:hover{background:linear-gradient(135deg,#16a34a,#15803d);box-shadow:0 4px 12px rgba(34,197,94,.4)}
.btn-orange{background:#fff7ed;border-color:#fdba74;color:#9a3412}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-full{width:100%}
.navbar{background:linear-gradient(135deg,#1a56db 0%,#1340b0 100%);padding:0 20px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;position:sticky;top:0;z-index:200;min-height:56px;box-shadow:0 4px 20px rgba(26,86,219,.35)}
.nb-brand{font-size:16px;font-weight:bold;color:#fff;white-space:nowrap;padding:10px 0}
.nb-nav{display:flex;gap:2px;flex:1;flex-wrap:wrap;padding:6px 0;min-width:0}
.nb-btn{padding:6px 10px;border:none;border-radius:7px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .15s}
.nb-btn:hover{background:rgba(255,255,255,.2);color:#fff}
.nb-btn.act{background:#fff;color:#1a56db;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.nb-user{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.85);flex-shrink:0}
.bx{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap;letter-spacing:.2px}
.b-admin{background:#dbeafe;color:#1e40af}
.b-pharm{background:#dcfce7;color:#166534}
.b-view{background:#f1f0ee;color:#444}
.b-red{background:#fee2e2;color:#991b1b}
.b-orange{background:#fef3c7;color:#92400e}
.b-green{background:#dcfce7;color:#166534}
.b-blue{background:#dbeafe;color:#1e40af}
.b-gray{background:#f1f0ee;color:#555}
.b-purple{background:#ede9fe;color:#5b21b6}
.b-teal{background:#ccfbf1;color:#134e4a}
.b-yellow{background:#fef9c3;color:#713f12}
.main{padding:16px;flex:1;max-width:1440px;margin:0 auto;width:100%;min-width:0}
.stitle{font-size:18px;font-weight:bold;margin-bottom:14px;color:#1a1a18;display:flex;align-items:center;gap:8px}
.card{background:#fff;border:1px solid #eaecf0;border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:0 1px 8px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.02)}
.card-title{font-size:14px;font-weight:bold;margin-bottom:12px;color:#1a1a18;display:flex;align-items:center;gap:6px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;min-width:0}
.flbl{font-size:12px;color:#888;font-weight:bold}
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;min-width:0}
@media(max-width:900px){.dash-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.dash-grid{grid-template-columns:1fr 1fr}}
.dc{border-radius:14px;padding:16px;color:#fff;position:relative;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.dc::before{content:'';position:absolute;right:-14px;top:-14px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.12)}
.dc-icon{font-size:26px;margin-bottom:6px;display:block}
.dc-num{font-size:30px;font-weight:bold;line-height:1}
.dc-lbl{font-size:11px;opacity:.85;margin-top:4px}
.dc-sub{font-size:10px;opacity:.7;margin-top:4px}
.dc-1{background:linear-gradient(135deg,#f59e0b,#d97706)}
.dc-2{background:linear-gradient(135deg,#ef4444,#dc2626)}
.dc-3{background:linear-gradient(135deg,#8b5cf6,#7c3aed)}
.dc-4{background:linear-gradient(135deg,#06b6d4,#0891b2)}
.mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
@media(max-width:600px){.mini-grid{grid-template-columns:1fr 1fr}}
.mc{background:#fff;border-radius:10px;padding:12px;border-left:4px solid;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;gap:10px}
.mc-icon{font-size:20px}
.mc-num{font-size:20px;font-weight:bold}
.mc-lbl{font-size:11px;color:#888}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;display:block}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:400px}
th{text-align:left;padding:9px 10px;border-bottom:2px solid #eee;color:#555;font-weight:bold;white-space:nowrap;background:#fafaf8;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
td{padding:8px 10px;border-bottom:1px solid #f2f2f0;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f5f7ff;transition:background .1s}
.ab{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.ab-yellow{background:#fef9c3;color:#713f12;border:1px solid #fde047}
.ab-blue{background:#dbeafe;color:#1e3a8a;border:1px solid #93c5fd}
.ab-green{background:#dcfce7;color:#14532d;border:1px solid #86efac}
.ab-red{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.ab-orange{background:#fff7ed;color:#9a3412;border:1px solid #fdba74}
/* warn badge on duplicate name */
.dup-warn{background:#fef9c3;color:#713f12;border:1px solid #fde047;border-radius:6px;padding:2px 7px;font-size:11px;display:inline-block;margin-left:4px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:12px;overflow-y:auto}
.modal{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);margin:auto}
.modal-wide{max-width:820px}
.mtitle{font-size:16px;font-weight:bold;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #f0f0ee;display:flex;align-items:center;gap:8px}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid #f0f0ee;flex-wrap:wrap}
.grow2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:480px){.grow2{grid-template-columns:1fr}.grow3{grid-template-columns:1fr 1fr}}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.step-list{display:flex;flex-direction:column;gap:7px;margin-top:8px}
.si{border:1.5px solid #e5e5e0;border-radius:8px;padding:10px 12px;transition:all .2s}
.si.done{border-color:#86efac;background:#f0fdf4}
.sh{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sn{width:26px;height:26px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0;background:#fff}
.sn.done{background:#dcfce7;border-color:#86efac;color:#166534}
.sfields{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.srow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.srow label{font-size:12px;color:#666;min-width:80px}
.srow input{flex:1;min-width:100px;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit}
/* daily report preview */
.report-section{border:1px solid #e5e5e0;border-radius:8px;margin-bottom:12px;overflow:hidden}
.report-section-header{background:#f8f8f6;padding:10px 14px;font-weight:bold;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.report-section-header:hover{background:#f0f0ee}
.report-section-body{padding:0;display:none}
.report-section-body.open{display:block}
.report-item{padding:8px 14px;border-top:1px solid #f0f0ee;font-size:13px;display:flex;gap:8px;align-items:center}
.report-item:first-child{border-top:none}
code{font-family:monospace;background:#f0f0ee;padding:2px 5px;border-radius:4px;font-size:12px}
.tmpl{font-size:11px;color:#1a56db;cursor:pointer;text-decoration:underline;margin-left:4px}
.notify-tag{display:inline-flex;align-items:center;gap:4px;background:#f0f0ee;border-radius:6px;padding:4px 10px;font-size:12px;margin:3px}
.notify-del{cursor:pointer;color:#999;font-weight:bold;margin-left:4px}
.notify-del:hover{color:#e00}
.rpt-section{border:1px solid #e5e5e0;border-radius:10px;margin-bottom:10px;overflow:hidden}
.rpt-head{background:#f5f5f2;padding:10px 14px;font-weight:bold;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;user-select:none}
.rpt-head:hover{background:#eeeee9}
.rpt-head-done{background:#f0fdf4}.rpt-head-done:hover{background:#dcfce7}
.rpt-head-pend{background:#fef9c3}.rpt-head-pend:hover{background:#fef08a}
.rpt-body{display:none;border-top:1px solid #e5e5e0}
.rpt-body.open{display:block}
.rpt-row{padding:8px 14px;border-bottom:1px solid #f0f0ee;font-size:12px}
.rpt-row:last-child{border-bottom:none}
.rpt-id{font-family:monospace;background:#f0f0ee;padding:1px 5px;border-radius:4px;font-size:11px;margin-right:6px}
.status-detail{font-size:11px;color:#555;background:#f8f8f6;border:1px solid #e5e5e0;border-radius:5px;padding:2px 6px;display:inline-block;margin-top:2px}
.dup-warn{background:#fef9c3;color:#713f12;border:1px solid #fde047;border-radius:6px;padding:2px 7px;font-size:11px;display:inline-block;margin-left:4px}

/* ── RESPONSIVE ── */

/* Desktop ≥1024px — full layout */
@media(min-width:1024px){
  .main{padding:20px}
  .dash-grid{grid-template-columns:repeat(4,1fr)}
  .mini-grid{grid-template-columns:repeat(3,1fr)}
  .cal-grid{grid-template-columns:repeat(4,1fr)!important}
  .hide-desktop{display:none!important}
}

/* Tablet landscape 768–1023px */
@media(min-width:768px) and (max-width:1023px){
  .main{padding:14px}
  .dash-grid{grid-template-columns:repeat(2,1fr)}
  .mini-grid{grid-template-columns:repeat(3,1fr)}
  .cal-grid{grid-template-columns:repeat(4,1fr)!important}
  .hide-tablet-l{display:none!important}
  table{font-size:12px}
  th,td{padding:7px 8px}
  .navbar{padding:0 12px}
}

/* Tablet portrait 600–767px */
@media(min-width:600px) and (max-width:767px){
  .main{padding:12px}
  .dash-grid{grid-template-columns:repeat(2,1fr)}
  .mini-grid{grid-template-columns:repeat(2,1fr)}
  .cal-grid{grid-template-columns:repeat(3,1fr)!important}
  .hide-tablet-p{display:none!important}
  table{font-size:12px;min-width:300px}
  th,td{padding:6px 8px}
  .btn{padding:6px 10px;font-size:12px}
  .nb-btn{font-size:11px;padding:5px 8px}
  .navbar{padding:0 10px;min-height:50px}
  .stitle{font-size:16px}
  .grow3{grid-template-columns:1fr 1fr}
}

/* Mobile landscape + small tablet 480–599px */
@media(min-width:480px) and (max-width:599px){
  .main{padding:10px}
  .dash-grid{grid-template-columns:1fr 1fr}
  .mini-grid{grid-template-columns:1fr 1fr}
  .cal-grid{grid-template-columns:repeat(3,1fr)!important}
  table{font-size:11px;min-width:260px}
  th,td{padding:5px 6px}
  .btn{padding:5px 9px;font-size:11px}
  .btn-sm{padding:4px 7px;font-size:11px}
  .nb-btn{font-size:10px;padding:4px 7px}
  .navbar{padding:0 8px;min-height:46px}
  .stitle{font-size:15px}
  .hide-tablet-p{display:none!important}
  .grow2{grid-template-columns:1fr}
  .grow3{grid-template-columns:1fr 1fr}
  .card{padding:12px}
}

/* Mobile portrait ≤479px */
@media(max-width:479px){
  .main{padding:8px}
  .dash-grid{grid-template-columns:1fr 1fr;gap:8px}
  .mini-grid{grid-template-columns:1fr 1fr;gap:8px}
  .cal-grid{grid-template-columns:repeat(2,1fr)!important}
  table{font-size:11px;min-width:240px}
  th,td{padding:5px 6px}
  .btn{padding:5px 10px;font-size:11px;gap:4px}
  .btn-sm{padding:4px 7px;font-size:10px}
  .btn-xs{padding:2px 5px;font-size:10px}
  .nb-btn{font-size:10px;padding:4px 6px}
  .nb-brand{font-size:14px}
  .navbar{padding:0 8px;min-height:44px;gap:4px}
  .stitle{font-size:14px;margin-bottom:10px}
  .card{padding:10px;border-radius:12px;margin-bottom:10px}
  .modal{padding:12px;border-radius:12px}
  .grow2{grid-template-columns:1fr}
  .grow3{grid-template-columns:1fr 1fr}
  .dc-num{font-size:24px}
  .dc{padding:12px}
  .hide-mobile{display:none!important}
}

/* Shared hide classes */
@media(max-width:767px){
  .hide-mobile{display:none!important}
  .nb-user .hide-mobile{display:none!important}
  .toolbar{gap:6px}
}

/* Navbar: wrap on small screens */
@media(max-width:599px){
  .navbar{flex-wrap:wrap;padding:6px 8px;gap:4px}
  .nb-nav{order:3;width:100%;padding:2px 0}
  .nb-brand{order:1}
  .nb-user{order:2;margin-left:auto}
}

/* Table horizontal scroll on all small screens */
@media(max-width:767px){
  .tw{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px}
  table{min-width:500px}
}
@media(max-width:479px){
  table{min-width:380px}
}

/* Modal responsive */
@media(max-width:599px){
  .modal-bg{padding:6px;align-items:flex-end}
  .modal{max-height:94vh;border-radius:16px 16px 0 0;margin:0}
}
@media(max-width:479px){
  .modal{max-height:96vh}
  .mfooter{flex-direction:column}
  .mfooter .btn{width:100%;justify-content:center}
}

/* Calendar grid responsive override */
.cal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:767px){.cal-grid{grid-template-columns:repeat(3,1fr)!important;gap:6px}}
@media(max-width:479px){.cal-grid{grid-template-columns:repeat(2,1fr)!important;gap:6px}}

/* Toolbar wrap tightly on mobile */
@media(max-width:599px){
  .toolbar{margin-bottom:8px}
  .flbl{display:none}
}

/* Print */
@media print{
  .navbar,.toolbar,.no-print{display:none!important}
  .main{padding:0;max-width:100%}
  .card{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid}
  body{background:#fff}
  .modal-bg{display:none!important}
  table{min-width:0!important;font-size:11px}
}

/* Touch-friendly tap targets */
@media(max-width:767px){
  .btn{min-height:36px}
  .nb-btn{min-height:32px}
  input[type=text],input[type=search],input[type=date],input[type=email],input[type=number],select,.fi{min-height:38px;font-size:14px!important}
  .bx{padding:4px 10px;font-size:11px}
  /* calendar cells bigger on mobile */
  .cal-grid > div{min-height:60px!important;padding:8px 4px!important}
}
@media(max-width:479px){
  .btn{min-height:38px}
  .cal-grid > div{min-height:56px!important}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ===================== STEP DEFINITIONS ===================== */
var BORROW=[
  {num:1,label:'ติดต่อบริษัท/โรงพยาบาล',fields:[{id:'contact',label:'ชื่อบริษัท/รพ.'}]},
  {num:2,label:'ทำหนังสือขอยืมยา',fields:[{id:'borrow_qty',label:'จำนวน',type:'number'},{id:'borrow_date',label:'วันที่',type:'date'}]},
  {num:3,label:'ส่งหนังสือขอยืมยา',fields:[{id:'aw',label:'เลข อว.',ph:'----/----'},{id:'send_date',label:'เมื่อวันที่',type:'date'}]},
  {num:4,label:'ได้รับยาและรับเข้าแล้ว',fields:[]},
  {num:5,label:'ทำหนังสือขอคืนยา',fields:[]},
  {num:6,label:'ส่งหนังสือคืนยา',fields:[{id:'ret_aw',label:'เลข อว.',ph:'----/----'},{id:'receiver',label:'ผู้รับคืน'},{id:'position',label:'ตำแหน่ง'},{id:'ret_date',label:'วันที่',type:'date'}]},
];
var EXCHANGE=[
  {num:1,label:'ติดต่อบริษัท/โรงพยาบาล',fields:[{id:'contact',label:'ชื่อบริษัท/รพ.'}]},
  {num:2,label:'ทำหนังสือขอแลกเปลี่ยน',fields:[{id:'ex_date',label:'วันที่',type:'date'}]},
  {num:3,label:'ส่งหนังสือขอแลกเปลี่ยน',fields:[{id:'aw',label:'เลข อว.',ph:'----/----'},{id:'send_date',label:'เมื่อวันที่',type:'date'}]},
  {num:4,label:'แลกเปลี่ยนเรียบร้อย ยังไม่ได้รับเข้า',fields:[]},
  {num:5,label:'รับเข้าแล้ว',fields:[]},
];
var EXP_ACTIONS=[
  {id:'notify_doctor',label:'แจ้งแพทย์',color:'b-blue'},
  {id:'notify_org',label:'แจ้งองค์กรแพทย์',color:'b-blue'},
  {id:'notify_dept',label:'แจ้งภาควิชา',color:'b-blue'},
  {id:'exchange_hospital',label:'แลกเปลี่ยนกับโรงพยาบาล',color:'b-teal'},
  {id:'exchange_company',label:'แลกเปลี่ยนกับบริษัท',color:'b-teal'},
  {id:'transfer_destroy',label:'โอนรอทำลาย',color:'b-red'},
  {id:'borrow',label:'ยืมยา',color:'b-purple'},
  {id:'other',label:'อื่นๆ',color:'b-gray'},
];
var ACT_LBL={order01:'จัดทำใบ 01',order02:'จัดทำใบ 02',order03:'จัดทำใบ 03',po:'PO',special:'ซื้อเฉพาะราย',nobuy:'ไม่ซื้อแล้ว',borrow:'ยืมยา',other:'อื่นๆ'};
var ST_LBL={reorder:'ถึง Reorder Point',min:'ถึงระดับ Min',empty:'ยาหมดคลัง'};

function levDist(a,b){var m=a.length,n=b.length;if(!m||!n)return m||n;if(m>25||n>25)return Math.abs(m-n)>3?99:3;var dp=[];for(var i=0;i<=m;i++){dp[i]=[i];for(var j=1;j<=n;j++)dp[i][j]=0;}for(var j=0;j<=n;j++)dp[0][j]=j;for(var i=1;i<=m;i++)for(var j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[m][n];}

/* ─── Drug name duplicate detection ─── */
function getDupWarnings(){
  /* collect all drugs across all lists */
  var all=[];
  S.RD.forEach(function(d){all.push({id:d.id,name:d.name.toLowerCase().trim()});});
  S.ED.forEach(function(d){all.push({id:d.id,name:d.name.toLowerCase().trim()});});
  S.XD.forEach(function(d){all.push({id:d.id,name:d.name.toLowerCase().trim()});});
  S.RECV.forEach(function(r){if(r.drugName) all.push({id:r.drugId||('rv:'+r.id),name:r.drugName.toLowerCase().trim()});});
  /* find names that appear with different IDs — using simple similarity check */
  var warnings={}; /* id -> message */
  for(var i=0;i<all.length;i++){
    for(var j=i+1;j<all.length;j++){
      if(all[i].id!==all[j].id && nameSimilar(all[i].name,all[j].name) && all[i].name!==all[j].name){
        warnings[all[i].id]=(warnings[all[i].id]||[]);
        if(warnings[all[i].id].indexOf(all[j].id)===-1) warnings[all[i].id].push(all[j].id);
        warnings[all[j].id]=(warnings[all[j].id]||[]);
        if(warnings[all[j].id].indexOf(all[i].id)===-1) warnings[all[j].id].push(all[i].id);
      }
      /* exact same name but different IDs */
      if(all[i].id!==all[j].id && all[i].name===all[j].name){
        var key='exact:'+all[i].name;
        warnings[all[i].id]=(warnings[all[i].id]||[]); if(warnings[all[i].id].indexOf(all[j].id)===-1) warnings[all[i].id].push(all[j].id);
        warnings[all[j].id]=(warnings[all[j].id]||[]); if(warnings[all[j].id].indexOf(all[i].id)===-1) warnings[all[j].id].push(all[i].id);
      }
    }
  }
  return warnings;
}
function nameSimilar(a,b){
  /* Levenshtein distance <= 2 for strings longer than 6 chars */
  if(Math.abs(a.length-b.length)>3) return false;
  var d=levDist(a,b);
  return d>0 && d<=2;
}
function levDist(a,b){
  var m=a.length,n=b.length;
  if(m===0||n===0) return m||n;
  if(m>30||n>30) return Math.abs(m-n)>2?99:levDist(a.slice(0,15),b.slice(0,15)); /* cap for performance */
  var dp=[];
  for(var i=0;i<=m;i++){dp[i]=[i];for(var j=1;j<=n;j++){dp[i][j]=0;}}
  for(var j=0;j<=n;j++) dp[0][j]=j;
  for(var i=1;i<=m;i++){for(var j=1;j<=n;j++){dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);}}
  return dp[m][n];
}

/* ─── dup pair key (canonical order) ─── */
function dupKey(id1,id2){return id1<id2?id1+'||'+id2:id2+'||'+id1;}
/* ─── search filter helper ─── */
function matchSrch(q,id,name){
  if(!q) return true;
  var lq=q.toLowerCase();
  return (id&&id.toLowerCase().indexOf(lq)>=0)||(name&&name.toLowerCase().indexOf(lq)>=0);
}
/* ─── format date (remove time) ─── */
function fmtDate(d){
  if(!d) return '-';
  var s=String(d);
  // if already YYYY-MM-DD keep as is; if full date string strip time
  if(s.indexOf('T')>=0||s.indexOf('00:00:00')>=0){
    var dt=new Date(s);
    if(!isNaN(dt.getTime())) return dt.toISOString().slice(0,10);
  }
  return s.split(' ')[0]||s;
}

/* ─── helpers ─── */
function dupPairKey(a,b){return a<b?a+'||'+b:b+'||'+a;}
function daysLeft(expDate){if(!expDate)return null;var t=new Date();t.setHours(0,0,0,0);var e=new Date(expDate);e.setHours(0,0,0,0);return Math.ceil((e-t)/86400000);}
function matchSrch(q,id,name){if(!q)return true;var lq=(q||'').toLowerCase();return ((id||'').toLowerCase().indexOf(lq)>=0)||((name||'').toLowerCase().indexOf(lq)>=0);}
function fmtDate(s){if(!s||s==='-')return '-';var t=String(s);if(t.indexOf('T')>=0||t.indexOf('00:00:00')>=0){var d=new Date(t);if(!isNaN(d))return [(d.getFullYear()),(('0'+(d.getMonth()+1)).slice(-2)),(('0'+d.getDate()).slice(-2))].join('-');}return t.split(' ')[0]||t;}

  document.querySelectorAll('[data-rf2]').forEach(function(b){b.onclick=function(){S.rf2=b.dataset.rf2;render();};});
  document.querySelectorAll('[data-rvf2]').forEach(function(b){b.onclick=function(){S.recvf2=b.dataset.rvf2;render();};});
  document.querySelectorAll('[data-toggle-rpt]').forEach(function(b){b.onclick=function(){var body=document.getElementById('rsb-'+b.dataset.toggleRpt);if(body){body.classList.toggle('open');var a=b.querySelector('.rptarrow');if(a)a.innerHTML=body.classList.contains('open')?'&#9650;':'&#9660;';}};});
  document.querySelectorAll('[data-ef2]').forEach(function(b){b.onclick=function(){if(b.dataset.lt==='nearexp') S.ef=b.dataset.ef2; else S.xf=b.dataset.ef2;render();};});
  document.querySelectorAll('[data-rvf]').forEach(function(b){b.onclick=function(){S.recvf=b.dataset.rvf;render();};});
  xb('exp-r',function(){showExportModal('reorder');});
  xb('exp-e',function(){showExportModal('nearexp');});
  xb('exp-x',function(){showExportModal('deadstock');});
  xb('exp-recv',function(){showExportModal('receive');});
  document.querySelectorAll('[data-epdf]').forEach(function(b){b.onclick=function(){doPDF(b.dataset.epdf);};});
  fc('fi-r',function(e){handleCSV(e,'reorder');});
  fc('fi-lv',function(e){handleCSV(e,'levels');});
  fc('fi-e',function(e){handleCSV(e,'nearexp');});
  fc('fi-x',function(e){handleCSV(e,'deadstock');});
  fc('fi-recv',function(e){handleCSV(e,'receive');});
  document.querySelectorAll('[data-tmpl]').forEach(function(b){b.onclick=function(){downloadTemplate(b.dataset.tmpl);};});
  document.querySelectorAll('[data-opr]').forEach(function(b){b.onclick=function(){S.modal='reorder-act';S.md={id:b.dataset.opr};render();};});
  document.querySelectorAll('[data-edit-drug]').forEach(function(b){b.onclick=function(){
    var lt=b.dataset.lt,list=lt==='reorder'?S.RD:lt==='nearexp'?S.ED:S.XD;
    var d=findById(list,b.dataset.did);if(!d)return;
    S.modal='edit-drug';S.md={lt:lt,drug:JSON.parse(JSON.stringify(d))};render();
  };});
  document.querySelectorAll('[data-ope]').forEach(function(b){b.onclick=function(){S.modal='exp-act';S.md={id:b.dataset.ope,lt:b.dataset.lt};render();};});
  document.querySelectorAll('[data-vst]').forEach(function(b){b.onclick=function(){S.modal='steps';S.md={id:b.dataset.vst,lt:b.dataset.lt,aid:b.dataset.aid};render();};});
  document.querySelectorAll('[data-del-reorder-act]').forEach(function(b){b.onclick=function(){if(confirm('ยืนยันการลบการดำเนินการ?')){var d=findById(S.RD,b.dataset.delReorderAct);if(d){d.action=null;d.reason='';d.borrowStep=0;d.stepData={};}render();}};});
  document.querySelectorAll('[data-delr]').forEach(function(b){b.onclick=function(){if(confirm('ยืนยันการลบ?')){S.RD=S.RD.filter(function(x){return x.id!==b.dataset.delr;});render();}};});
  document.querySelectorAll('[data-dele]').forEach(function(b){b.onclick=function(){if(confirm('ยืนยันการลบ?')){if(b.dataset.lt==='nearexp') S.ED=S.ED.filter(function(x){return x.id!==b.dataset.dele;});else S.XD=S.XD.filter(function(x){return x.id!==b.dataset.dele;});render();}};});
  document.querySelectorAll('[data-del-act]').forEach(function(b){b.onclick=function(){
    var list=b.dataset.lt==='nearexp'?S.ED:S.XD;
    for(var i=0;i<list.length;i++){if(list[i].id===b.dataset.did){list[i].actions=list[i].actions.filter(function(a){return a.id!==b.dataset.aid;});break;}}
    render();
  };});
  xb('btn-add-recv',function(){S.modal='add-recv';S.md={received:null};render();});
  document.querySelectorAll('[data-edit-recv]').forEach(function(b){b.onclick=function(){var rv=S.RECV.find(function(x){return x.id===b.dataset.editRecv;});if(rv){S.modal='edit-recv';S.md=JSON.parse(JSON.stringify(rv));render();}};});
  document.querySelectorAll('[data-del-recv]').forEach(function(b){b.onclick=function(){if(confirm('ยืนยันการลบ?')){S.RECV=S.RECV.filter(function(x){return x.id!==b.dataset.delRecv;});render();}};});
  xb('btn-add-user',function(){S.modal='add-user';S.md={};render();});
  document.querySelectorAll('[data-del-user]').forEach(function(b){b.onclick=function(){if(b.dataset.delUser===S.user.id){alert('ไม่สามารถลบตัวเองได้');return;}if(confirm('ยืนยันการลบ?')){S.users=S.users.filter(function(u){return u.id!==b.dataset.delUser;});render();}};});
  document.querySelectorAll('[data-edit-user]').forEach(function(b){b.onclick=function(){var u=S.users.find(function(x){return x.id===b.dataset.editUser;});if(u){S.modal='edit-user';S.md={uid:u.id,name:u.name,username:u.username,role:u.role,email:u.email||''};render();}};});
  xb('btn-add-email',function(){var v=document.getElementById('inp-email');if(!v||!v.value.trim())return;var e=v.value.trim();if(S.notifyEmails.indexOf(e)===-1){S.notifyEmails.push(e);v.value='';render();}});
  document.querySelectorAll('[data-del-email]').forEach(function(b){b.onclick=function(){S.notifyEmails=S.notifyEmails.filter(function(e){return e!==b.dataset.delEmail;});render();};});
  xb('btn-add-line',function(){var v=document.getElementById('inp-line');if(!v||!v.value.trim())return;var t=v.value.trim();if(S.notifyLines.indexOf(t)===-1){S.notifyLines.push(t);v.value='';render();}});
  document.querySelectorAll('[data-del-line]').forEach(function(b){b.onclick=function(){S.notifyLines=S.notifyLines.filter(function(l){return l!==b.dataset.delLine;});render();};});
  xb('btn-clear-nearexp',function(){
    if(S.ED.length===0){alert('ไม่มีข้อมูลให้ลบ');return;}
    if(confirm('ยืนยันการลบข้อมูลยาใกล้หมดอายุ ทั้งหมด '+S.ED.length+' รายการ?\n\nไม่สามารถกู้คืนได้')){S.ED=[];render();}
  });
  xb('btn-clear-deadstock',function(){
    if(S.XD.length===0){alert('ไม่มีข้อมูลให้ลบ');return;}
    if(confirm('ยืนยันการลบข้อมูล Dead Stock ทั้งหมด '+S.XD.length+' รายการ?\n\nไม่สามารถกู้คืนได้')){S.XD=[];render();}
  });
  /* calendar month select */
  document.querySelectorAll('[data-set-mon]').forEach(function(b){b.onclick=function(){
    var m=b.dataset.setMon,lt=b.dataset.setLt;
    if(lt==='nearexp')S.expMonth=m; else S.xMonth=m;
    render();
  };});
  /* calendar year nav */
  document.querySelectorAll('[data-cal-prev],[data-cal-next]').forEach(function(b){b.onclick=function(){
    var y=b.dataset.calYear,lt=b.dataset.calPrev||b.dataset.calNext;
    if(!y) return;
    if(lt==='nearexp')S.calYear=y; else S.calYearX=y;
    render();
  };});
  /* search inputs — NO re-render on type, use separate filter button or blur */
  var _srchTimers={};
  ['reorder','nearexp','deadstock','receive'].forEach(function(t){
    var el=document.getElementById('srch-'+t);
    if(el){
      /* Keep input value in sync with state but don't re-render */
      el.oninput=function(){
        S.search[t]=this.value;
        clearTimeout(_srchTimers[t]);
        _srchTimers[t]=setTimeout(function(){
          /* Only update the table rows, not full re-render */
          var newHtml=mainH();
          var main=document.querySelector('.main');
          if(main){
            main.innerHTML=newHtml;
            bindMain();
            /* restore focus to search */
            var srch=document.getElementById('srch-'+t);
            if(srch){srch.focus();var v=srch.value;srch.value='';srch.value=v;}
          }
        },250);
      };
      el.onkeydown=function(e){if(e.key==='Enter')e.preventDefault();};
    }
  });
  /* dup review */
  document.querySelectorAll('[data-dup-review]').forEach(function(b){b.onclick=function(){var k=b.dataset.dupReview;if(!S.dupReviews[k])S.dupReviews[k]={status:'pending',reason:''};S.dupReviews[k].status='reviewed';render();};});
  document.querySelectorAll('[data-dup-undo]').forEach(function(b){b.onclick=function(){var k=b.dataset.dupUndo;if(S.dupReviews[k])S.dupReviews[k].status='pending';render();};});
  document.querySelectorAll('[data-dup-reason]').forEach(function(inp){inp.oninput=function(){var k=inp.dataset.dupReason;if(!S.dupReviews[k])S.dupReviews[k]={status:'reviewed',reason:''};S.dupReviews[k].reason=inp.value;};});
  document.querySelectorAll('[data-dup-pend]').forEach(function(b){b.onclick=function(){var k=b.dataset.dupPend;if(!S.dupReviews[k])S.dupReviews[k]={status:'pending',reason:''};S.dupReviews[k].status='pending';render();};});
  /* Google Apps Script sync buttons */
  document.querySelectorAll('[data-gasread]').forEach(function(b){b.onclick=function(){gasRead(b.dataset.gasread,null);};});
  document.querySelectorAll('[data-gasexport]').forEach(function(b){b.onclick=function(){gasExport(b.dataset.gasexport);};});
  /* Settings: test connection */
  document.querySelectorAll('[data-gas-test]').forEach(function(b){b.onclick=function(){
    var key=b.dataset.gasTest;
    /* save URL first if user typed but didn't click save */
    var el=document.getElementById('gasurl-'+key);
    if(el&&el.value.trim()) S.gasUrls[key]=el.value.trim();
    gasTest(key);
  };});
  /* Settings: save Web App URL */
  document.querySelectorAll('[data-gas-save]').forEach(function(b){b.onclick=function(){
    var key=b.dataset.gasSave;
    var el=document.getElementById('gasurl-'+key);
    if(el){S.gasUrls[key]=(el.value||'').trim();alert('บันทึก URL สำหรับ '+key+' แล้ว');}
    render();
  };});
  /* Show/hide Apps Script code */
  xb('btn-show-gas-code',function(){
    var block=document.getElementById('gas-code-block');
    var btn=document.getElementById('btn-show-gas-code');
    if(block){
      var show=block.style.display==='none';
      block.style.display=show?'block':'none';
      if(btn) btn.textContent=show?'&#128196; ซ่อน Code':'&#128196; ดู Apps Script Code';
    }
  });
  xb('btn-copy-gas',function(){
    var ta=document.getElementById('gas-code-text');
    if(ta){ta.select();document.execCommand('copy');alert('คัดลอก Code แล้ว!');}
  });
  xb('btn-sync-all',function(){gasReadAll();});
  xb('btn-preview-report',function(){S.modal='report-preview';S.md={};render();});
  /* clear section buttons (admin) */
  xb('btn-clear-rd',function(){
    if(S.RD.length===0){alert('ไม่มีข้อมูลให้ลบ');return;}
    if(confirm('ยืนยันการลบข้อมูล Reorder/Min/หมดคลัง ทั้งหมด '+S.RD.length+' รายการ?\n\nการดำเนินการนี้ไม่สามารถกู้คืนได้')){S.RD=[];render();}
  });
  xb('btn-clear-ed',function(){
    if(S.ED.length===0){alert('ไม่มีข้อมูลให้ลบ');return;}
    if(confirm('ยืนยันการลบข้อมูลยาใกล้หมดอายุ ทั้งหมด '+S.ED.length+' รายการ?\n\nการดำเนินการนี้ไม่สามารถกู้คืนได้')){S.ED=[];render();}
  });
  xb('btn-clear-xd',function(){
    if(S.XD.length===0){alert('ไม่มีข้อมูลให้ลบ');return;}
    if(confirm('ยืนยันการลบข้อมูล Dead Stock ทั้งหมด '+S.XD.length+' รายการ?\n\nการดำเนินการนี้ไม่สามารถกู้คืนได้')){S.XD=[];render();}
  });
  xb('btn-clear-recv',function(){
    if(S.RECV.length===0){alert('ไม่มีข้อมูลให้ลบ');return;}
    if(confirm('ยืนยันการลบข้อมูลยารับเข้า ทั้งหมด '+S.RECV.length+' รายการ?\n\nการดำเนินการนี้ไม่สามารถกู้คืนได้')){S.RECV=[];render();}
  });
  xb('btn-clear-levels',function(){
    var n=Object.keys(S.drugLevels).length;
    if(n===0){alert('ไม่มีข้อมูลให้ลบ');return;}
    if(confirm('ยืนยันการลบข้อมูล Drug Levels ทั้งหมด '+n+' รายการ?\n\nการดำเนินการนี้ไม่สามารถกู้คืนได้')){S.drugLevels={};render();}
  });
  xb('btn-clear-all',function(){
    var total=S.RD.length+S.ED.length+S.XD.length+S.RECV.length+Object.keys(S.drugLevels).length;
    if(total===0){alert('ไม่มีข้อมูลให้ลบ');return;}
    if(confirm('&#9888; ยืนยันการลบข้อมูลยาทั้งหมดทุกส่วน?\n\nReorder/Min/หมดคลัง: '+S.RD.length+' รายการ\nยาใกล้หมดอายุ: '+S.ED.length+' รายการ\nDead Stock: '+S.XD.length+' รายการ\nยารับเข้า: '+S.RECV.length+' รายการ\nDrug Levels: '+Object.keys(S.drugLevels).length+' รายการ\n\nรวม '+total+' รายการ — ไม่สามารถกู้คืนได้')){
      if(confirm('กดยืนยันอีกครั้งเพื่อยืนยันการลบข้อมูลทั้งหมด')){
        S.RD=[];S.ED=[];S.XD=[];S.RECV=[];S.drugLevels={};render();
      }
    }
  });
  /* report section toggles */
  document.querySelectorAll('[data-toggle-section]').forEach(function(b){b.onclick=function(){
    var body=document.getElementById('rsb-'+b.dataset.toggleSection);
    if(body){body.classList.toggle('open');b.querySelector('.rsc-arrow').textContent=body.classList.contains('open')?'&#9650;':'&#9660;';}
  };});
}
function xb(id,fn){var el=document.getElementById(id);if(el)el.onclick=fn;}
function fc(id,fn){var el=document.getElementById(id);if(el)el.onchange=fn;}

/* ==================== DASHBOARD ==================== */
function dashH(){
  var dups=getDups(),dupIds=getDupIds();
  var dow=new Date().getDay();
  var today='วัน'+DAYS_TH[dow]+' '+new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});
  var nr=S.RD.filter(function(x){return !x.action;}).length;
  var ne=S.ED.filter(function(x){return x.actions.length===0;}).length;
  var nx=S.XD.filter(function(x){return x.actions.length===0;}).length;
  var nrv=S.RECV.filter(function(x){return x.received===null;}).length;
  var total=nr+ne+nx;
  var pendRows=[];
  S.RD.filter(function(x){return !x.action;}).forEach(function(x){pendRows.push('<tr><td><code>'+x.id+'</code></td><td>'+x.name+'</td><td>Reorder/Min</td><td style="font-size:11px;color:#888">'+ST_LBL[x.status]+'</td><td><span class="bx b-orange">รอ</span></td></tr>');});
  S.ED.filter(function(x){return x.actions.length===0;}).forEach(function(x){pendRows.push('<tr><td><code>'+x.id+'</code></td><td>'+x.name+'</td><td>ใกล้หมดอายุ</td><td style="font-size:11px;color:#888">'+x.expDate+'</td><td><span class="bx b-red">รอ</span></td></tr>');});
  S.XD.filter(function(x){return x.actions.length===0;}).forEach(function(x){pendRows.push('<tr><td><code>'+x.id+'</code></td><td>'+x.name+'</td><td>Dead Stock</td><td style="font-size:11px;color:#888">'+x.expDate+'</td><td><span class="bx b-gray">รอ</span></td></tr>');});
  var doneRows=[];
  S.RD.filter(function(x){return !!x.action;}).forEach(function(x){doneRows.push('<tr><td><code>'+x.id+'</code></td><td>'+x.name+'</td><td>Reorder/Min</td><td style="font-size:11px;color:#444">'+actDetailText(x)+'</td></tr>');});
  S.ED.filter(function(x){return x.actions.length>0;}).forEach(function(x){doneRows.push('<tr><td><code>'+x.id+'</code></td><td>'+x.name+'</td><td>ใกล้หมดอายุ</td><td style="font-size:11px;color:#444">'+x.actions.map(function(a){return expActDetailText(a);}).join(' | ')+'</td></tr>');});
  S.XD.filter(function(x){return x.actions.length>0;}).forEach(function(x){doneRows.push('<tr><td><code>'+x.id+'</code></td><td>'+x.name+'</td><td>Dead Stock</td><td style="font-size:11px;color:#444">'+x.actions.map(function(a){return expActDetailText(a);}).join(' | ')+'</td></tr>');});
  return '<div class="stitle">&#127968; ภาพรวม <span style="font-size:13px;font-weight:normal;color:#888">'+today+'</span></div>'+
  '<div class="no-print" style="margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">'+
  '<button class="btn btn-blue" id="btn-sync-all" style="padding:10px 20px;font-size:14px;font-weight:600">&#128260; ดึงข้อมูลทั้งหมดจาก Google Sheet</button>'+
  '<span id="gsync-all-status" style="font-size:13px"></span>'+
  '<div style="margin-left:auto;display:flex;gap:8px"><button class="btn" data-epdf="dashboard">&#128438; Export PDF</button><button class="btn btn-blue" id="btn-preview-report">&#128276; ดูตัวอย่าง Daily Report</button></div>'+
  (dups.length?'<div class="ab ab-orange" style="display:block">&#9888; <b>พบชื่อยาที่คล้ายกันหรือเหมือนกัน แต่รหัสต่างกัน '+dups.length+' คู่</b> — อาจพิมพ์ผิดหรือบันทึกซ้ำ กรุณาตรวจสอบ'+
    '<table style="margin-top:10px;width:100%;font-size:12px;border-collapse:collapse">'+
      '<thead><tr>'+
        '<th style="text-align:left;padding:5px 8px;background:#f59e0b22;border-bottom:1px solid #f59e0b44;width:5%">#</th>'+
        '<th style="text-align:left;padding:5px 8px;background:#f59e0b22;border-bottom:1px solid #f59e0b44;width:12%">รหัสยา 1</th>'+
        '<th style="text-align:left;padding:5px 8px;background:#f59e0b22;border-bottom:1px solid #f59e0b44;width:33%">ชื่อยา 1</th>'+
        '<th style="text-align:center;padding:5px 8px;background:#f59e0b22;border-bottom:1px solid #f59e0b44;width:5%"></th>'+
        '<th style="text-align:left;padding:5px 8px;background:#f59e0b22;border-bottom:1px solid #f59e0b44;width:12%">รหัสยา 2</th>'+
        '<th style="text-align:left;padding:5px 8px;background:#f59e0b22;border-bottom:1px solid #f59e0b44;width:33%">ชื่อยา 2</th>'+
      '<th style="text-align:left;padding:5px 8px;background:#f59e0b22;border-bottom:1px solid #f59e0b44">สถานะทบทวน</th>'+
      '<th style="text-align:left;padding:5px 8px;background:#f59e0b22;border-bottom:1px solid #f59e0b44">เหตุผล</th>'+
      '</tr></thead><tbody>'+
      dups.map(function(p,i){
        var key=dupKey(p.idA,p.idB);
        var rev=S.dupReviews[key]||{status:'pending',reason:''};
        var isDone=rev.status==='reviewed';
        return '<tr style="border-bottom:1px solid #f59e0b33;background:'+(isDone?'#f0fdf4':'')+'">'+
          '<td style="padding:5px 8px;color:#92400e;font-weight:bold">'+(i+1)+'</td>'+
          '<td style="padding:5px 8px"><code style="background:#fef3c7;color:#92400e">'+p.idA+'</code></td>'+
          '<td style="padding:5px 8px;font-weight:bold">'+p.nameA+'</td>'+
          '<td style="padding:5px 8px;text-align:center;color:#92400e">&#8596;</td>'+
          '<td style="padding:5px 8px"><code style="background:#fef3c7;color:#92400e">'+p.idB+'</code></td>'+
          '<td style="padding:5px 8px;font-weight:bold">'+p.nameB+' <span class="bx b-yellow" style="font-size:10px">'+(p.exact?'ชื่อเหมือนกัน':'ชื่อคล้ายกัน')+'</span></td>'+
          '<td style="padding:5px 8px;min-width:140px">'+
            (isDone?
              '<span class="bx b-green" style="font-size:11px">&#10003; ทบทวนแล้ว</span> '+
              '<button class="btn btn-xs" data-dup-undo="'+key+'">ยกเลิก</button>':
              '<button class="btn btn-xs btn-blue" data-dup-review="'+key+'">ทบทวนแล้ว</button> '+
              '<button class="btn btn-xs" style="color:#aaa" data-dup-skip="'+key+'">ยังไม่ทบทวน</button>')+
          '</td>'+
          '<td style="padding:5px 8px;min-width:160px">'+
            (isDone&&rev.reason?'<span style="font-size:11px;color:#166534">'+rev.reason+'</span>':
              isDone?'<input type="text" placeholder="ใส่เหตุผล (ไม่บังคับ)" value="'+(rev.reason||'')+'" data-dup-reason="'+key+'" style="font-size:11px;padding:3px 6px;border:1px solid #ddd;border-radius:5px;width:150px">':
              '<span style="font-size:11px;color:#aaa">—</span>')+
          '</td>'+
        '</tr>';
      }).join('')+
    '</tbody></table></div>':'')+
  '<div class="dash-grid">'+dc('dc-1','&#9888;',S.RD.length,'Reorder/Min/หมดคลัง','ยังไม่ดำเนินการ '+nr)+dc('dc-2','&#9203;',S.ED.length,'ยาใกล้หมดอายุ','ยังไม่ดำเนินการ '+ne)+dc('dc-3','&#128230;',S.XD.length,'Dead Stock','ยังไม่ดำเนินการ '+nx)+dc('dc-4','&#128666;',S.RECV.length,'ยารับเข้า','รอดำเนินการ '+nrv)+'</div>'+
  '<div class="mini-grid">'+mc('#f59e0b','&#128204;',S.RD.filter(function(x){return x.status==="empty";}).length,'ยาหมดคลัง','#92400e')+mc('#ef4444','&#128205;',S.RD.filter(function(x){return x.status==="min";}).length,'ถึงระดับ Min','#991b1b')+mc('#10b981','&#128504;',S.RECV.filter(function(x){return x.received===true;}).length,'รับเข้าแล้ว','#065f46')+'</div>'+
  (total>0?'<div class="ab ab-yellow">&#9888; ยังไม่ดำเนินการ <b>'+total+' รายการ</b>'+(S.notifyEmails.length||S.notifyLines.length?' — จะส่ง Daily Report: <b>'+S.notifyEmails.length+' email</b>, <b>'+S.notifyLines.length+' LINE</b>':'<span style="color:#c00"> — ยังไม่ตั้งค่าช่องทางแจ้งเตือน</span>')+'</div>':'<div class="ab ab-green">&#10003; ยาทุกรายการได้รับการดำเนินการแล้ว</div>')+
  '<div class="card"><div class="card-title">&#128203; รายการรอดำเนินการ</div><div class="tw"><table><thead><tr><th>รหัสยา</th><th>ชื่อยา</th><th>ประเภท</th><th>หมายเหตุ</th><th>สถานะ</th></tr></thead><tbody>'+(pendRows.length?pendRows.join(''):'<tr><td colspan="5" style="text-align:center;color:#aaa;padding:16px">ไม่มีรายการรอดำเนินการ</td></tr>')+'</tbody></table></div></div>'+
  '<div class="card"><div class="card-title">&#10003; ดำเนินการแล้ว — รายละเอียด</div><div class="tw"><table><thead><tr><th>รหัสยา</th><th>ชื่อยา</th><th>ประเภท</th><th>รายละเอียดการดำเนินการ</th></tr></thead><tbody>'+(doneRows.length?doneRows.join(''):'<tr><td colspan="4" style="text-align:center;color:#aaa;padding:16px">ยังไม่มีรายการที่ดำเนินการแล้ว</td></tr>')+'</tbody></table></div></div>'+
  (Object.keys(S.drugLevels).length?'<div class="card"><div class="card-title">&#128200; Drug Levels</div><div class="tw"><table><thead><tr><th>รหัสยา</th><th>ชื่อยา</th><th style="text-align:right">Max</th><th style="text-align:right">Reorder</th><th style="text-align:right">Min</th></tr></thead><tbody>'+Object.keys(S.drugLevels).map(function(k){var lv=S.drugLevels[k];return '<tr><td><code>'+k+'</code></td><td>'+(lv.name||'-')+'</td><td style="text-align:right">'+lv.max+'</td><td style="text-align:right">'+lv.reorder+'</td><td style="text-align:right">'+lv.min+'</td></tr>';}).join('')+'</tbody></table></div></div>':'');
}
function dc(cls,icon,num,lbl,sub){return '<div class="dc '+cls+'"><span class="dc-icon">'+icon+'</span><div class="dc-num">'+num+'</div><div class="dc-lbl">'+lbl+'</div><div class="dc-sub">'+sub+'</div></div>';}
function mc(color,icon,num,lbl,tc){return '<div class="mc" style="border-color:'+color+'"><span class="mc-icon">'+icon+'</span><div><div class="mc-num" style="color:'+tc+'">'+num+'</div><div class="mc-lbl">'+lbl+'</div></div></div>';}
/* ==================== REORDER ==================== */
function reorderH(){
  var isAdmin=S.user.role==='admin',isPharm=S.user.role==='pharmacist',can=S.user.role!=='viewer';
  var dupIds=getDupIds();
  var f=S.rf,f2=S.rf2;
  var sq=S.search.reorder||'';
  var drugs=(f==='all'?S.RD:S.RD.filter(function(d){return d.status===f;})).filter(function(d){return matchSrch(sq,d.id,d.name);});
  if(f2==='pending') drugs=drugs.filter(function(d){return !d.action;});
  else if(f2==='done') drugs=drugs.filter(function(d){return !!d.action;});
  else if(f2==='borrow_all') drugs=drugs.filter(function(d){return d.action==='borrow';});
  else if(f2==='borrow_s1') drugs=drugs.filter(function(d){return d.action==='borrow'&&d.borrowStep===0;});
  else if(f2==='borrow_s2') drugs=drugs.filter(function(d){return d.action==='borrow'&&d.borrowStep===1;});
  else if(f2==='borrow_s3') drugs=drugs.filter(function(d){return d.action==='borrow'&&d.borrowStep===2;});
  else if(f2==='borrow_s4') drugs=drugs.filter(function(d){return d.action==='borrow'&&d.borrowStep>=3;});
  else if(f2==='order01') drugs=drugs.filter(function(d){return d.action==='order01';});
  else if(f2==='po') drugs=drugs.filter(function(d){return d.action==='po';});
  else if(f2==='nobuy') drugs=drugs.filter(function(d){return d.action==='nobuy';});
  var cnt={all:S.RD.length,reorder:S.RD.filter(function(x){return x.status==='reorder';}).length,min:S.RD.filter(function(x){return x.status==='min';}).length,empty:S.RD.filter(function(x){return x.status==='empty';}).length};
  var f2opts=[{v:'all',l:'ทั้งหมด'},{v:'pending',l:'รอดำเนินการ'},{v:'done',l:'ดำเนินการแล้ว'},{v:'order01',l:'จัดทำใบ 01'},{v:'po',l:'PO'},{v:'nobuy',l:'ไม่ซื้อแล้ว'},{v:'borrow_all',l:'ยืมยา'},{v:'borrow_s1',l:'ยืม: รอติดต่อ'},{v:'borrow_s2',l:'ยืม: ติดต่อแล้ว'},{v:'borrow_s3',l:'ยืม: ทำหนังสือแล้ว'},{v:'borrow_s4',l:'ยืม: ส่งหนังสือ+'}];
  var rows=drugs.map(function(d){
    var sc=d.status==='empty'?'b-red':d.status==='min'?'b-orange':'b-blue';
    var qc=d.qty===0?'#991b1b':d.qty<=d.min?'#92400e':d.qty<=d.reorder?'#1e40af':'#166534';
    var warn=dupIds[d.id]?'<span class="dup-warn">&#9888; ตรวจสอบรหัส</span>':'';
    var actCell=d.action?
      '<span class="bx b-green">'+ACT_LBL[d.action]+'</span>'+
      (d.action==='borrow'&&d.borrowStep>0?'<br><span class="status-detail">ขั้นตอน '+d.borrowStep+'/'+BORROW.length+': '+(BORROW[d.borrowStep-1]?BORROW[d.borrowStep-1].label:'')+'</span>':'')+
      (d.reason?'<br><span class="status-detail">เหตุผล: '+d.reason+'</span>':'')+
      (can?' <button class="btn btn-xs no-print" data-opr="'+d.id+'">&#9998;</button> <button class="btn btn-xs btn-red no-print" data-del-reorder-act="'+d.id+'">&#10005; ลบ</button>':'')
      :(can?'<button class="btn btn-sm no-print" data-opr="'+d.id+'">เลือก</button>':'<span class="bx b-gray">รอ</span>');
    return '<tr><td><code>'+d.id+'</code></td><td>'+d.name+warn+'</td>'+
      '<td style="text-align:right;font-weight:bold;color:'+qc+'">'+d.qty.toLocaleString()+'</td>'+
      '<td style="text-align:right;color:#888" class="hide-mobile">'+d.max.toLocaleString()+'</td>'+
      '<td style="text-align:right;color:#888" class="hide-mobile">'+d.reorder.toLocaleString()+'</td>'+
      '<td style="text-align:right;color:#888" class="hide-mobile">'+d.min.toLocaleString()+'</td>'+
      '<td style="text-align:right;font-weight:bold;color:#92400e;background:#fef9c3" class="hide-mobile">'+Math.max(0,d.max-d.min).toLocaleString()+'</td>'+
      '<td><span class="bx '+sc+'">'+ST_LBL[d.status]+'</span></td>'+
      '<td>'+actCell+'</td>'+
      (isAdmin?'<td class="no-print"><button class="btn btn-xs" data-edit-drug="1" data-lt="reorder" data-did="'+d.id+'">&#9998; แก้ไข</button> <button class="btn btn-xs btn-red" data-delr="'+d.id+'">&#128465;️</button></td>':'')+
    '</tr>';
  }).join('');
  return '<div class="stitle">&#9888; Reorder / Min / ยาหมดคลัง</div>'+
  '<div class="toolbar no-print"><input class="fi" id="srch-reorder" type="search" placeholder="&#128269; ค้นหา รหัสยา / ชื่อยา..." value="'+esc(sq)+'" style="max-width:300px"></div>'+
  '<div class="toolbar no-print">'+
  (can?'<button class="btn btn-green" data-gasread="reorder">&#128196; ดึงข้อมูลจาก Sheet'+(S.gasUrls.reorder?' <span style="font-size:10px;opacity:.7">'+S.gasUrls.reorder.slice(39,60)+'...</span>':'')+'</button>'+
       '<button class="btn btn-green" data-gasread="levels">&#128200; ดึง Drug Levels'+(S.gasUrls.levels?' <span style="font-size:10px;opacity:.7">ตั้งค่าแล้ว</span>':'')+'</button>':'')+
  (isAdmin?'<button class="btn" data-gasexport="reorder">&#9650; ส่งข้อมูลไป Sheet</button>':'')+
  '<span style="display:none" id="gsync-status-reorder"></span>'+
  '<button class="btn" id="exp-r">&#128196; Export CSV</button><button class="btn" data-epdf="reorder">&#128438; PDF</button>'+(isAdmin?'<button class="btn btn-red" id="btn-clear-rd">&#128465; ลบทั้งหมด</button>':'')+'</div>'+
  '<div class="toolbar no-print"><span class="flbl">สต๊อก:</span>'+['all','reorder','min','empty'].map(function(v){return '<button class="btn btn-sm'+(f===v?' btn-blue':'')+'" data-rf="'+v+'">'+(v==='all'?'ทั้งหมด':ST_LBL[v])+' ('+cnt[v]+')</button>';}).join('')+'</div>'+
  '<div class="toolbar no-print"><span class="flbl">การดำเนินการ:</span><div style="display:flex;gap:4px;flex-wrap:wrap">'+f2opts.map(function(o){return '<button class="btn btn-sm'+(f2===o.v?' btn-blue':'')+'" data-rf2="'+o.v+'">'+o.l+'</button>';}).join('')+'</div></div>'+
  '<div class="card"><div class="tw"><table><thead><tr><th>รหัสยา</th><th>ชื่อยา</th><th style="text-align:right">คงเหลือ</th><th style="text-align:right" class="hide-mobile">Max</th><th style="text-align:right" class="hide-mobile">Reorder</th><th style="text-align:right" class="hide-mobile">Min</th><th style="text-align:right;background:#fef9c3;color:#92400e" class="hide-mobile">ปริมาณที่ต้องซื้อ<br><span style="font-weight:normal;font-size:10px">(Max - Min)</span></th><th>สถานะ</th><th>การดำเนินการ</th>'+(isAdmin?'<th class="no-print"></th>':'')+'</tr></thead><tbody>'+(rows||'<tr><td colspan="10" style="text-align:center;color:#aaa;padding:16px">ไม่มีรายการ</td></tr>')+'</tbody></table></div></div>';
}
/* ==================== EXP / DEAD STOCK ==================== */
function expH(drugs,lt,f){
  var isAdmin=S.user.role==='admin',isPharm=S.user.role==='pharmacist',can=S.user.role!=='viewer';
  var dup=getDupWarnings();
  var title=lt==='nearexp'?'&#9203; ยาใกล้หมดอายุ':'&#128230; Dead Stock';
  var expId=lt==='nearexp'?'exp-e':'exp-x';
  var today=new Date();today.setHours(0,0,0,0);
  var sq2=S.search[lt]||'';
  var expMon=lt==='nearexp'?S.expMonth:(S.xMonth||'all');

  /* ── build calendar data ── */
  /* collect all years and months with drugs */
  var yearMap={}; /* year -> {month -> count} */
  drugs.forEach(function(d){
    if(!d.expDate) return;
    var p=d.expDate.slice(0,7).split('-');
    if(p.length<2) return;
    var y=p[0],m=p[1];
    if(!yearMap[y]) yearMap[y]={};
    if(!yearMap[y][m]) yearMap[y][m]=0;
    yearMap[y][m]++;
  });
  var years=Object.keys(yearMap).sort();

  /* current calendar year to show */
  var calYear=S.calYear||years[0]||String(new Date().getFullYear());
  if(lt==='deadstock') calYear=S.calYearX||years[0]||String(new Date().getFullYear());

  /* drugs without expDate */
  var noExpDrugs=drugs.filter(function(d){return !d.expDate||d.expDate.trim()===''||d.expDate==='undefined';});

  /* filter drugs by selected month */
  var opts=['all','none'].concat(EXP_ACTIONS.map(function(a){return a.id;}));
  var baseFiltered=(f==='all'?drugs:f==='none'?drugs.filter(function(d){return d.actions.length===0;}):drugs.filter(function(d){return d.actions.some(function(a){return a.actId===f;});}));
  var filtered=baseFiltered
    .filter(function(d){return matchSrch(sq2,d.id,d.name);})
    .filter(function(d){
      if(expMon==='all') return d.expDate&&d.expDate.trim()!=='';
      return d.expDate&&d.expDate.slice(0,7)===expMon;
    });

  /* ── calendar HTML ── */
  var MONTHS_TH=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  var MONTHS_SH=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

  function calendarH(){
    var thYear=parseInt(calYear)+543;
    var prevYear=String(parseInt(calYear)-1);
    var nextYear=String(parseInt(calYear)+1);
    var hasPrev=parseInt(calYear)>parseInt(years[0]||calYear);
    var hasNext=parseInt(calYear)<parseInt(years[years.length-1]||calYear);

    var monthCells=MONTHS_TH.map(function(mName,idx){
      var mNum=('0'+(idx+1)).slice(-2);
      var key=calYear+'-'+mNum;
      var cnt=(yearMap[calYear]&&yearMap[calYear][mNum])||0;
      var isSelected=expMon===key;
      var urgentCnt=0;
      if(cnt>0){drugs.forEach(function(d){if(d.expDate&&d.expDate.slice(0,7)===key){var dl2=daysLeft(d.expDate);if(dl2!==null&&dl2<=30)urgentCnt++;}});}
      var bg=isSelected?'#1a56db':cnt>0?(urgentCnt>0?'#fef2f2':'#fffbeb'):'#f9fafb';
      var textCol=isSelected?'#fff':cnt>0?(urgentCnt>0?'#991b1b':'#92400e'):'#ccc';
      var border=isSelected?'2px solid #1a56db':cnt>0?(urgentCnt>0?'1.5px solid #fca5a5':'1.5px solid #fde68a'):'1px solid #eee';
      var shadow=isSelected?'0 2px 8px rgba(26,86,219,.3)':'none';
      return '<div '+
        (cnt>0?'data-set-mon="'+key+'" data-set-lt="'+lt+'"':'')+
        ' style="background:'+bg+';color:'+textCol+';border:'+border+';border-radius:10px;'+
        'padding:10px 6px;text-align:center;cursor:'+(cnt>0?'pointer':'default')+';transition:all .15s;'+
        'box-shadow:'+shadow+'">'+
        '<div style="font-size:12px;font-weight:'+(cnt>0?'600':'400')+'">'+MONTHS_SH[idx]+'</div>'+
        (cnt>0?
          '<div style="font-size:22px;font-weight:700;margin:2px 0">'+cnt+'</div>'+
          (urgentCnt>0?'<div style="font-size:10px;background:rgba(220,38,38,.15);border-radius:10px;padding:1px 5px">&#128308; '+urgentCnt+'</div>':'')
          :'<div style="font-size:16px;color:#ddd;margin:4px 0">—</div>')+
      '</div>';
    }).join('');

    return '<div style="background:#fff;border-radius:14px;border:1px solid #eaecf0;padding:16px 20px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">'+
        '<div style="display:flex;gap:6px;align-items:center">'+
          '<button class="btn btn-sm" data-cal-prev="'+lt+'" data-cal-year="'+prevYear+'" '+(hasPrev?'':'disabled style="opacity:.3"')+'>&#9664;</button>'+
          '<span style="font-size:16px;font-weight:700;color:#1a1a18;min-width:90px;text-align:center">พ.ศ. '+thYear+'</span>'+
          '<button class="btn btn-sm" data-cal-next="'+lt+'" data-cal-year="'+nextYear+'" '+(hasNext?'':'disabled style="opacity:.3"')+'>&#9654;</button>'+
        '</div>'+
        '<div style="font-size:14px;color:#555">'+
          (expMon!=='all'&&expMon!=='noexp'?
            '<span style="background:#dbeafe;color:#1e40af;padding:4px 12px;border-radius:20px;font-weight:600">'+
              MONTHS_TH[parseInt(expMon.split('-')[1])-1]+' พ.ศ. '+(parseInt(expMon.split('-')[0])+543)+
            '</span>':'<span style="color:#aaa">เลือกเดือนจากปฏิทิน</span>')+
        '</div>'+
        '<button class="btn btn-sm" data-set-mon="all" data-set-lt="'+lt+'" style="'+(expMon==='all'?'background:#1a56db;color:#fff;border-color:#1a56db':'')+'">ทั้งหมด</button>'+
      '</div>'+
      '<div class="cal-grid">'+monthCells+'</div>'+
      (noExpDrugs.length?
        '<div style="margin-top:12px;padding:8px 12px;background:#f9fafb;border-radius:8px;cursor:pointer;border:1px solid #eee;font-size:12px;color:#888;display:flex;align-items:center;gap:8px" data-set-mon="noexp" data-set-lt="'+lt+'">'+
          '<span style="font-size:16px">&#128204;</span>'+
          '<span>ยาที่ยังไม่ระบุวันหมดอายุ <b>'+noExpDrugs.length+' รายการ</b></span>'+
          (expMon==='noexp'?'<span style="margin-left:auto;color:#1a56db">&#9660; แสดงอยู่</span>':'<span style="margin-left:auto">&#9654;</span>')+
        '</div>':'')+
    '</div>';
  }

  /* ── drug rows ── */
  var showNoExp=expMon==='noexp';
  var displayDrugs=showNoExp?noExpDrugs.filter(function(d){return matchSrch(sq2,d.id,d.name);}):filtered;

  var rows=displayDrugs.map(function(d){
    var ec='#166534',dl='',daysBadge='';
    if(d.expDate&&!showNoExp){
      var dv=daysLeft(d.expDate);
      if(dv===null||dv===undefined){ec='#888';}
      else if(dv<=0){ec='#991b1b';daysBadge='<span class="bx b-red" style="font-size:11px">หมดอายุแล้ว</span>';}
      else if(dv<=30){ec='#991b1b';daysBadge='<span class="bx b-red" style="font-size:11px">&#128308; เหลือ '+dv+' วัน</span>';}
      else if(dv<=90){ec='#92400e';daysBadge='<span class="bx b-orange" style="font-size:11px">&#128993; เหลือ '+dv+' วัน</span>';}
      else{daysBadge='<span class="bx b-green" style="font-size:11px">&#128994; เหลือ '+dv+' วัน</span>';}
      dl=daysBadge?'<div style="margin-top:3px">'+daysBadge+'</div>':'';
    }
    var warn=dup[d.id]&&dup[d.id].length>0?'<span class="dup-warn">&#9888;</span>':'';
    var actSum=d.actions.length?d.actions.map(function(a){
      var hs=a.actId==='exchange_hospital'||a.actId==='exchange_company'||a.actId==='borrow';
      var tot=a.actId==='borrow'?BORROW.length:EXCHANGE.length;
      return '<div style="margin-bottom:3px"><span class="bx '+eac(a.actId)+'">'+eal(a.actId)+'</span>'+(a.responsible?' <small>'+a.responsible+'</small>':'')+(hs?' <button class="btn btn-xs no-print" data-vst="'+d.id+'" data-lt="'+lt+'" data-aid="'+a.id+'">ขั้นตอน '+a.exchangeStep+'/'+tot+'</button>':'')+(isAdmin?' <button class="btn btn-xs btn-red no-print" data-del-act="1" data-lt="'+lt+'" data-did="'+d.id+'" data-aid="'+a.id+'">&#128465;</button>':'')+'</div>';
    }).join(''):'<span class="bx b-gray">รอดำเนินการ</span>';
    return '<tr><td><code>'+d.id+'</code></td><td>'+d.name+warn+'</td>'+
      '<td style="text-align:right;font-weight:bold">'+d.qty.toLocaleString()+'</td>'+
      '<td><span style="color:'+ec+';font-weight:bold">'+(d.expDate?fmtDate(d.expDate):'-')+'</span></td>'+
      '<td>'+dl+'</td>'+
      '<td>'+actSum+'</td>'+
      '<td class="no-print">'+(can?'<button class="btn btn-xs btn-blue" data-ope="'+d.id+'" data-lt="'+lt+'">+ เพิ่ม</button> ':'')+
      (isAdmin?'<button class="btn btn-xs" data-edit-drug="1" data-lt="'+lt+'" data-did="'+d.id+'">&#9998;</button> <button class="btn btn-xs btn-red" data-dele="'+d.id+'" data-lt="'+lt+'">&#128465;</button>':'')+
      '</td></tr>';
  }).join('');

  /* count for title */
  var filteredCount=expMon==='all'?drugs.filter(function(d){return d.expDate&&d.expDate.trim()!=='';}).length:expMon==='noexp'?noExpDrugs.length:filtered.length;

  return '<div class="stitle">'+title+
    (expMon!=='all'&&expMon!=='noexp'?
      ' <span style="font-size:13px;font-weight:normal;color:#1a56db;background:#dbeafe;padding:3px 10px;border-radius:20px">'+
        MONTHS_TH[parseInt(expMon.split('-')[1])-1]+' พ.ศ. '+(parseInt(expMon.split('-')[0])+543)+' — '+filteredCount+' รายการ'+
      '</span>':'')+

/* ==================== RECEIVE ==================== */
function receiveH(){
  var isAdmin=S.user.role==='admin',isPharm=S.user.role==='pharmacist',can=S.user.role!=='viewer';
  var dupIds=getDupIds();
  var f=S.recvf,f2=S.recvf2;
  var sq3=S.search.receive||'';
  var filtered=(f==='all'?S.RECV:f==='received'?S.RECV.filter(function(r){return r.received===true;}):f==='notreceived'?S.RECV.filter(function(r){return r.received===false;}):S.RECV.filter(function(r){return r.received===null;})).filter(function(r){return matchSrch(sq3,'',r.drugName);});
  if(f2==='po') filtered=filtered.filter(function(r){return r.notReceivedReason==='กำลังทำ PO';});
  else if(f2==='01') filtered=filtered.filter(function(r){return r.notReceivedReason==='กำลังทำใบ 01';});
  else if(f2==='02') filtered=filtered.filter(function(r){return r.notReceivedReason==='กำลังทำใบ 02';});
  else if(f2==='time') filtered=filtered.filter(function(r){return r.notReceivedReason==='ยังไม่ถึงเวลาที่สามารถรับเข้า';});
  else if(f2==='other') filtered=filtered.filter(function(r){return r.notReceivedReason==='อื่นๆ';});
  else if(f2==='no_reason') filtered=filtered.filter(function(r){return r.received===null;});
  var rows=filtered.map(function(rv){
    var stBadge=rv.received===true?'<span class="bx b-green">&#10003; รับเข้าแล้ว</span>':
      rv.received===false?'<span class="bx b-orange">&#9888; ยังไม่รับเข้า</span><br><span class="status-detail">'+rv.notReceivedReason+(rv.notReceivedOther?' ('+rv.notReceivedOther+')':'')+'</span>':
      '<span class="bx b-gray">รอดำเนินการ</span>';
    var warn=rv.drugId&&dupIds[rv.drugId]?'<span class="dup-warn">&#9888;</span>':'';
    var dateStr=rv.arrivalDate?new Date(rv.arrivalDate).toLocaleDateString('th-TH',{year:'numeric',month:'2-digit',day:'2-digit'})||rv.arrivalDate:'-';
    if(dateStr==='Invalid Date') dateStr=rv.arrivalDate;
    return '<tr><td>'+dateStr+'</td><td>'+rv.drugName+warn+'</td><td>'+(rv.lot||'-')+'</td><td style="text-align:right;font-weight:bold">'+rv.qty.toLocaleString()+'</td><td>'+stBadge+'</td><td class="no-print">'+(can?'<button class="btn btn-xs" data-edit-recv="'+rv.id+'">&#9998;</button> ':'')+( isAdmin?'<button class="btn btn-xs btn-red" data-del-recv="'+rv.id+'">&#128465;</button>':'')+'</td></tr>';
  }).join('');
  var f2opts=[{v:'all',l:'ทั้งหมด'},{v:'no_reason',l:'รอดำเนินการ'},{v:'01',l:'กำลังทำใบ 01'},{v:'02',l:'กำลังทำใบ 02'},{v:'po',l:'กำลังทำ PO'},{v:'time',l:'ยังไม่ถึงเวลา'},{v:'other',l:'อื่นๆ'}];
  return '<div class="stitle">&#128666; ยารับเข้า</div>'+
  '<div class="toolbar no-print"><input class="fi" id="srch-receive" type="text" placeholder="&#128269; ค้นหา ชื่อยา..." value="'+esc(sq3)+'" style="max-width:300px;padding:7px 10px"></div>'+
  '<div class="toolbar no-print">'+(can?'<button class="btn btn-blue" id="btn-add-recv">+ เพิ่มรายการ</button>':'')+
  (can?'<button class="btn btn-green" data-gasread="receive">&#128196; ดึงข้อมูลจาก Sheet'+(S.gasUrls.receive?' <span style="font-size:10px;opacity:.7">ตั้งค่าแล้ว</span>':'')+'</button>':'')+

  '<span style="display:none" id="gsync-status-receive"></span>'+
  '<button class="btn" id="exp-recv">&#128196; Export CSV</button><button class="btn" data-epdf="receive">&#128438; PDF</button>'+(isAdmin?'<button class="btn btn-red" id="btn-clear-recv">&#128465; ลบทั้งหมด</button>':'')+'</div>'+
  '<div class="toolbar no-print"><span class="flbl">สถานะรับเข้า:</span>'+['all','received','notreceived','pending'].map(function(v){var l=v==='all'?'ทั้งหมด':v==='received'?'รับเข้าแล้ว':v==='notreceived'?'ยังไม่รับเข้า':'รอดำเนินการ';return '<button class="btn btn-sm'+(f===v?' btn-blue':'')+'" data-rvf="'+v+'">'+l+'</button>';}).join('')+'</div>'+
  '<div class="toolbar no-print"><span class="flbl">เหตุผล:</span><div style="display:flex;gap:4px;flex-wrap:wrap">'+f2opts.map(function(o){return '<button class="btn btn-sm'+(f2===o.v?' btn-blue':'')+'" data-rvf2="'+o.v+'">'+o.l+'</button>';}).join('')+'</div></div>'+
  '<div class="card"><div class="tw"><table><thead><tr><th>วันที่ยามาถึง</th><th>ชื่อยา</th><th>Lot</th><th style="text-align:right">จำนวน</th><th>สถานะ</th><th class="no-print"></th></tr></thead><tbody>'+(rows||'<tr><td colspan="6" style="text-align:center;color:#aaa;padding:16px">ไม่มีรายการ</td></tr>')+'</tbody></table></div></div>';

'}\n\n'+
'function doPost(e) {\n'+

'    return out({error: err.toString()});\n'+
'  }\n'+
'}\n\n'+

'    .createTextOutput(JSON.stringify(obj))\n'+

'}';

  return '<div class="stitle">&#9881; ตั้งค่าระบบ</div>'+

function reorderActH(){
  var drug=findById(S.RD,S.md.id);if(!drug)return '';

  }
  return h+'</div>';
}

function findById(arr,id){for(var i=0;i<arr.length;i++){if(arr[i].id===id)return arr[i];}return null;}
function doExportCSV(data,fn){if(!data.length){alert('ไม่มีข้อมูล');return;}var skip=['stepData','actions'];var keys=Object.keys(data[0]).filter(function(k){return !skip.includes(k)&&typeof data[0][k]!=='object';});var csv=[keys.join(',')].concat(data.map(function(r){return keys.map(function(k){return '"'+(r[k]!=null?r[k]:'')+'\"';}).join(',');})).join('\n');dl('data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv),fn);}

function handleCSV(e,type){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var lines=ev.target.result.trim().split('\n');
    if(lines.length<2){alert('ไฟล์ไม่มีข้อมูล');return;}
    var headers=lines[0].split(',').map(function(h){return h.trim().replace(/^"|"$/g,'');});
    var rows=[];
    for(var i=1;i<lines.length;i++){if(!lines[i].trim())continue;var vals=lines[i].split(',').map(function(v){return v.trim().replace(/^"|"$/g,'');});var o={};for(var j=0;j<headers.length;j++)o[headers[j]]=vals[j]||'';rows.push(o);}
    var cnt=0;
    if(type==='reorder'){rows.forEach(function(o){
      var id=(o['รหัสยา']||o['drug_id']||'').trim();if(!id)return;
      var lv=S.drugLevels[id]||null;
      var maxVal=lv?lv.max:(parseInt(o['max'])||0);
      var roVal=lv?lv.reorder:(parseInt(o['reorder_point']||o['reorder'])||0);
      var minVal=lv?lv.min:(parseInt(o['min'])||0);
      var ex=findById(S.RD,id);
      if(ex){ex.name=o['ชื่อยา']||o['name']||ex.name;ex.qty=ii(o['จำนวน']||o['qty'],ex.qty);ex.max=maxVal;ex.reorder=roVal;ex.min=minVal;ex.status=o['status']||calcStatus(ex);}
      else var _nd=makeDrug({id:id,name:o['ชื่อยา']||o['name']||'',qty:parseInt(o['จำนวน']||o['qty'])||0,max:maxVal,reorder:roVal,min:minVal});_nd.status=calcStatus(_nd);S.RD.push(_nd);
      cnt++;
    });}
    else if(type==='levels'){rows.forEach(function(o){var id=(o['รหัสยา']||o['drug_id']||'').trim();if(!id)return;S.drugLevels[id]={name:o['ชื่อยา']||o['name']||'',max:parseInt(o['max'])||0,reorder:parseInt(o['reorder_point']||o['reorder'])||0,min:parseInt(o['min'])||0};var d=findById(S.RD,id);if(d){d.max=S.drugLevels[id].max;d.reorder=S.drugLevels[id].reorder;d.min=S.drugLevels[id].min;}cnt++;});}

    /* check dups after import */
    var dups=getDupWarnings();var dupIds=Object.keys(dups);

/*
  วิธีสร้าง Apps Script Web App:
  1. เปิด Google Sheet → Extensions → Apps Script
  2. วาง code ด้านล่าง → บันทึก → Deploy → New deployment
     Type: Web app | Execute as: Me | Who has access: Anyone

*/

/* ---- SYNC ALL sheets ---- */
function gasReadAll(){
  var el=document.getElementById('gsync-all-status');
  function set(msg,c){if(el)el.innerHTML='<span style="color:'+(c||'#555')+'">'+msg+'</span>';}
  function fetchSheet(type,cb){
    var url=S.gasUrls[type];
    if(!url){cb(null,'ไม่มี URL');return;}
    var sep=url.indexOf('?')>=0?'&':'?';
    fetch(url+sep+'sheet='+encodeURIComponent(type)+'&t='+Date.now(),{redirect:'follow'})
      .then(function(r){return r.text();})
      .then(function(raw){
        var d;try{d=JSON.parse(raw);}catch(e){throw new Error('JSON error: '+raw.slice(0,50));}
        if(d.error)throw new Error(d.error);
        cb(d.rows||[],null);
      })
      .catch(function(e){cb(null,e.message);});
  }

  set('&#9203; (1/5) กำลังดึง Drug Levels...');
  /* 1 — DrugLevels ต้องเสร็จก่อนทุกอย่าง */
  fetchSheet('levels',function(rows1,e1){
    if(e1){set('&#9888; DrugLevels error: '+e1,'#c00');}
    else{
      importRows('levels',rows1);
      set('&#9203; (2/5) Drug Levels &#10003; ('+Object.keys(S.drugLevels).length+' รายการ) — กำลังดึง Reorder...');
    }
    /* 2 — Reorder หลัง levels เสร็จ */
    fetchSheet('reorder',function(rows2,e2){
      if(e2){set('&#9888; Reorder error: '+e2,'#c00');}
      else{
        importRows('reorder',rows2);
        set('&#9203; (3/5) Reorder &#10003; ('+S.RD.length+' รายการ, max sample: '+( S.RD[0]?S.RD[0].max:'?')+') — ดึงที่เหลือ...');
      }
      /* 3,4,5 — parallel */
      var left=3,errs=[];
      function done3(lbl,e){
        left--;if(e)errs.push(lbl);
        if(left===0){
          var ok='&#10003; ดึงข้อมูลครบทั้งหมด — Reorder: '+S.RD.length+', NearExp: '+S.ED.length+', DeadStock: '+S.XD.length+', Receive: '+S.RECV.length;
          set(ok+(errs.length?' &#9888; error: '+errs.join(','):''),errs.length?'#92400e':'#166534');
          render();
        }
      }
      fetchSheet('nearexp',function(r,e){if(!e)importRows('nearexp',r);done3('nearexp',e);});
      fetchSheet('deadstock',function(r,e){if(!e)importRows('deadstock',r);done3('deadstock',e);});
      fetchSheet('receive',function(r,e){if(!e)importRows('receive',r);done3('receive',e);});
    });
  });
}

/* ---- SYNC ALL sheets ---- */
function gasReadAll(){
  var types=['levels','reorder','nearexp','deadstock','receive'];
  var total=types.length, done=0, errors=[];
  var el=document.getElementById('gsync-all-status');
  if(el) el.innerHTML='<span style="color:#888">⏳ กำลังดึงข้อมูลทั้งหมด (0/'+total+')...</span>';
  function next(i){
    if(i>=types.length){
      var msg=errors.length?'&#9888; เสร็จแล้ว ('+done+'/'+total+') มีข้อผิดพลาด: '+errors.join(', '):'&#10003; ดึงข้อมูลครบทั้ง '+total+' ชุดแล้ว';
      if(el) el.innerHTML='<span style="color:'+(errors.length?'#92400e':'#166534')+'">'+msg+'</span>';
      render();
      return;
    }
    var type=types[i];
    var url=S.gasUrls[type];
    if(!url){errors.push(type+' (ไม่มี URL)');done++;if(el)el.innerHTML='<span style="color:#888">⏳ กำลังดึง ('+done+'/'+total+')...</span>';next(i+1);return;}
    var sep=url.indexOf('?')>=0?'&':'?';
    fetch(url+sep+'sheet='+encodeURIComponent(type)+'&t='+Date.now(),{redirect:'follow'})
      .then(function(r){return r.text();})
      .then(function(raw){
        var data=JSON.parse(raw);
        if(data.error) throw new Error(data.error);
        var rows=data.rows||[];
        importRows(type,rows);
        /* after levels loaded, re-apply to RD */
        if(type==='levels'){
          S.RD.forEach(function(d){var lv=S.drugLevels[d.id];if(lv){d.max=lv.max;d.reorder=lv.reorder;d.min=lv.min;d.status=calcStatus(d);}});
        }
        done++;
        if(el) el.innerHTML='<span style="color:#888">⏳ กำลังดึง ('+done+'/'+total+') — '+type+' ✓</span>';
        next(i+1);
      })
      .catch(function(e){
        errors.push(type+' ('+e.message.slice(0,30)+')');done++;
        if(el) el.innerHTML='<span style="color:#888">⏳ กำลังดึง ('+done+'/'+total+')...</span>';
        next(i+1);
      });
  }
  next(0);
}

/* ---- parse rows into app data ---- */
function importRows(type,rows){
  var cnt=0;
  if(type==='reorder'){
    /*
      Strategy: REPLACE ALL จาก Sheet
      - ล้างรายการที่ไม่มีใน Sheet (ยาถูกลบ หรือไม่ถึง Reorder แล้ว)
      - อัพเดทจำนวน/ชื่อจาก Sheet
      - รักษา action/การดำเนินการเดิมไว้ (ไม่ล้าง)
      - ยาที่เพิ่มใหม่ใน Sheet จะถูก add
    */
    var oldActions={};
    S.RD.forEach(function(d){
      if(d.action||d.actions&&d.actions.length){
        oldActions[d.id]={action:d.action,reason:d.reason,borrowStep:d.borrowStep,stepData:d.stepData,actions:d.actions};
      }
    });

    /* สร้างรายการใหม่ทั้งหมดจาก Sheet */
    var newRD=[];
    rows.forEach(function(o){
      var id=(o['รหัสยา']||o['drug_id']||'').trim();if(!id)return;
      var qty=parseInt(o['จำนวน']||o['qty']||o['Qty'])||0;
      var name=o['ชื่อยา']||o['name']||'';
      var lv=S.drugLevels[id]||null;
      var nd=makeDrug({
        id:id,name:name,qty:qty,
        max:lv?lv.max:0,
        reorder:lv?lv.reorder:0,
        min:lv?lv.min:0
      });
      /* คืน action เดิมถ้ามี */
      if(oldActions[id]){
        nd.action=oldActions[id].action;
        nd.reason=oldActions[id].reason;
        nd.borrowStep=oldActions[id].borrowStep;
        nd.stepData=oldActions[id].stepData;
        nd.actions=oldActions[id].actions;
      }
      nd.status=calcStatus(nd);
      newRD.push(nd);
      cnt++;
    });

    /* Replace ทั้งหมด */
    S.RD=newRD;

    /* force-apply drugLevels (unconditional) */
    S.RD.forEach(function(d){
      var lv=S.drugLevels[d.id];
      if(lv){d.max=lv.max;d.reorder=lv.reorder;d.min=lv.min;}
      d.status=calcStatus(d);
    });
    console.log('[importRows reorder] replaced with',cnt,'drugs from Sheet. Preserved actions for',Object.keys(oldActions).length,'drugs.');
  } else if(type==='levels'){
    rows.forEach(function(o){
      /* normalize keys — Sheet headers อาจมีตัวพิมพ์ใหญ่-เล็ก หรือชื่อต่างกัน */
      var norm={};
      Object.keys(o).forEach(function(k){norm[k.trim().toLowerCase()]=String(o[k]).trim();});
      var id=(norm['รหัสยา']||norm['drug_id']||norm['id']||norm['drugid']||'').trim();
      if(!id)return;
      /* support: Max/max/MAX, Reorder/reorder/REORDER/reorder_point/reorder point, Min/min/MIN */
      function getNum(keys){
        for(var ki=0;ki<keys.length;ki++){
          var v=norm[keys[ki].toLowerCase()];
          if(v!==undefined&&v!==''){var n=parseInt(v);if(!isNaN(n))return n;}
        }
        return 0;
      }
      var maxV=getNum(['max','Max','MAX','จำนวนสูงสุด']);
      var roV =getNum(['reorder_point','reorder point','reorder','Reorder','REORDER','Reorder_point','Reorder Point','reorder point','จุดสั่งซื้อ']);
      var minV=getNum(['min','Min','MIN','จำนวนต่ำสุด']);
      S.drugLevels[id]={name:o['ชื่อยา']||o['name']||norm['ชื่อยา']||norm['name']||'',max:maxV,reorder:roV,min:minV};
      /* Always overwrite RD */
      var d=findById(S.RD,id);
      if(d){d.max=maxV;d.reorder=roV;d.min=minV;d.status=calcStatus(d);}
      cnt++;
    });
    console.log('[importRows levels] loaded',cnt,'entries. Sample drugLevels:',JSON.stringify(Object.keys(S.drugLevels).slice(0,3).reduce(function(a,k){a[k]=S.drugLevels[k];return a;},{})));
  } else if(type==='receive'){
    /*
      Strategy: REPLACE ALL
      - ล้างรายการเก่า เอาจาก Sheet ใหม่ทั้งหมด
      - รักษา received status/เหตุผล ถ้า lot+ชื่อยา+วันที่ตรงกัน
    */
    var oldRecv={};
    S.RECV.forEach(function(r){
      var key=(r.drugName+'|'+r.lot+'|'+r.arrivalDate).toLowerCase();
      oldRecv[key]=r;
    });
    var newRECV=[];
    rows.forEach(function(o){
      var arrDate=fmtDate(o['วันที่ยามาถึง']||o['arrival_date']||'');
      var drugName=o['ชื่อยา']||o['name']||'';
      var lot=o['lot']||o['Lot']||'';
      var qty=parseInt(o['จำนวน']||o['qty'])||0;
      var key=(drugName+'|'+lot+'|'+arrDate).toLowerCase();
      var old=oldRecv[key];
      newRECV.push(makeRecv({
        id:old?old.id:uid(),
        arrivalDate:arrDate,
        drugId:'',
        drugName:drugName,
        lot:lot,
        qty:qty,
        received:old?old.received:null,
        notReceivedReason:old?old.notReceivedReason:'',
        notReceivedOther:old?old.notReceivedOther:''
      }));
      cnt++;
    });
    S.RECV=newRECV;
    console.log('[importRows receive] replaced with',cnt,'rows from Sheet.');
  } else {
    /*
      Strategy: REPLACE ALL for nearexp/deadstock
      - ล้างรายการเก่า เอาจาก Sheet ใหม่ทั้งหมด
      - รักษา actions/การดำเนินการ ถ้า id ตรงกัน
    */
    var oldArr=type==='nearexp'?S.ED:S.XD;
    var oldActs={};
    oldArr.forEach(function(d){if(d.actions&&d.actions.length)oldActs[d.id]=d.actions;});
    var newArr=[];
    rows.forEach(function(o){
      var id=(o['รหัสยา']||o['drug_id']||'').trim();if(!id)return;
      var nd=makeDrug({
        id:id,
        name:o['ชื่อยา']||o['name']||'',
        qty:parseInt(o['จำนวน']||o['qty'])||0,
        expDate:fmtDate(o['วันหมดอายุ']||o['exp_date'])||''
      });
      if(oldActs[id]) nd.actions=oldActs[id];
      newArr.push(nd);
      cnt++;
    });
    if(type==='nearexp') S.ED=newArr; else S.XD=newArr;
    console.log('[importRows '+type+'] replaced with',cnt,'drugs. Preserved actions for',Object.keys(oldActs).length,'drugs.');
  }
  return cnt;
}

/* ---- export current data back to Sheet ---- */
function gasExport(type){
  var url=S.gasUrls[type];
  if(!url){alert('กรุณาตั้งค่า Web App URL ก่อน');S.tab='settings';render();return;}
  var rows=[];
  if(type==='reorder'){
    rows=S.RD.map(function(d){return {'รหัสยา':d.id,'ชื่อยา':d.name,'จำนวน':d.qty,'max':d.max,'reorder_point':d.reorder,'min':d.min,'status':d.status,'action':d.action||''};});
  } else if(type==='levels'){
    rows=Object.keys(S.drugLevels).map(function(k){var lv=S.drugLevels[k];return {'รหัสยา':k,'ชื่อยา':lv.name||'','max':lv.max,'reorder_point':lv.reorder,'min':lv.min};});
  } else if(type==='receive'){
    rows=S.RECV.map(function(r){return {'วันที่ยามาถึง':r.arrivalDate,'ชื่อยา':r.drugName,'lot':r.lot,'จำนวน':r.qty,'received':r.received===true?'รับเข้าแล้ว':r.received===false?'ยังไม่รับเข้า':'รอดำเนินการ','เหตุผล':r.notReceivedReason||''};});
  } else {
    var arr=type==='nearexp'?S.ED:S.XD;
    rows=arr.map(function(d){return {'รหัสยา':d.id,'ชื่อยา':d.name,'จำนวน':d.qty,'วันหมดอายุ':d.expDate,'actions':d.actions.map(function(a){return eal(a.actId)+(a.responsible?' ('+a.responsible+')':'');}).join(', ')};});
  }
  if(rows.length===0){alert('ไม่มีข้อมูลให้ส่ง');return;}
  gasWrite(type,rows,function(){alert('ส่งข้อมูล '+rows.length+' แถว ไปยัง Google Sheet แล้ว');});
}

/* ── Export with filter modal ── */
function doExportCSVFiltered(type){
  var list=type==='reorder'?S.RD:type==='nearexp'?S.ED:type==='deadstock'?S.XD:S.RECV;
  var filtered=list.slice();
  /* apply status filter */
  var stFilter=document.querySelector('[data-exp-filter="status"]:checked');
  if(stFilter&&stFilter.value!=='all') filtered=filtered.filter(function(d){return d.status===stFilter.value;});
  /* apply act filter */
  var actF=document.querySelector('[data-exp-filter="act"]:checked');
  if(actF){if(actF.value==='done')filtered=filtered.filter(function(d){return !!d.action;});else if(actF.value==='pending')filtered=filtered.filter(function(d){return !d.action;});}
  /* apply month filter (any checked) */
  var monF=document.querySelectorAll('[data-exp-filter="month"]:checked');
  if(monF&&monF.length>0){var allChk=false;var months=[];monF.forEach(function(cb){if(cb.value==='all')allChk=true;else months.push(cb.value);});if(!allChk&&months.length>0)filtered=filtered.filter(function(d){return d.expDate&&months.indexOf(d.expDate.slice(0,7))>=0;});}
  /* apply days filter */
  var daysF=document.querySelector('[data-exp-filter="days"]:checked');
  if(daysF&&daysF.value!=='all'){var maxD=parseInt(daysF.value);filtered=filtered.filter(function(d){var dl=daysLeft(d.expDate);return dl!==null&&dl<=maxD;});}
  /* apply receive status */
  var rvF=document.querySelector('[data-exp-filter="rvst"]:checked');
  if(rvF&&rvF.value!=='all'){if(rvF.value==='received')filtered=filtered.filter(function(r){return r.received===true;});else if(rvF.value==='notreceived')filtered=filtered.filter(function(r){return r.received===false;});else filtered=filtered.filter(function(r){return r.received===null;});}
  if(!filtered.length){alert('ไม่มีข้อมูลที่ตรงกับ filter');return;}
  /* determine columns */
  var colsEl=document.querySelector('[name="exp-cols"]:checked');
  var keyCols=colsEl&&colsEl.value==='key';
  var skip=['stepData','actions','borrowStep','stepData'];
  var keys=Object.keys(filtered[0]).filter(function(k){return skip.indexOf(k)<0&&typeof filtered[0][k]!=='object';});
  if(keyCols){
    if(type==='reorder') keys=['id','name','qty','status','max','reorder','min'];
    else if(type==='nearexp'||type==='deadstock') keys=['id','name','qty','expDate'];
    else keys=['arrivalDate','drugName','lot','qty','notReceivedReason'];
    keys=keys.filter(function(k){return filtered[0].hasOwnProperty(k)||true;});
  }
  /* add daysLeft for exp types */
  if(type==='nearexp'||type==='deadstock'){
    var withDays=filtered.map(function(d){var o={};keys.forEach(function(k){o[k]=d[k];});o['วันที่เหลือ']=daysLeft(d.expDate);return o;});
    filtered=withDays;keys=keys.concat(['วันที่เหลือ']);
  }
  var csv=[keys.join(',')].concat(filtered.map(function(r){return keys.map(function(k){return '"'+(r[k]!=null?r[k]:'')+'"';}).join(',');})).join('\n');
  dl('data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv),type+'_export.csv');
}
